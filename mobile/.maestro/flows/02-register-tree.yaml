appId: com.bayka.app
---
# Flow: Register a Tree via Species Button Grid
# Tests one-tap tree registration: navigate to subgroup, tap a species button,
# verify tree count increments, then undo.

- launchApp:
    clearState: true
- assertVisible:
    id: "email-input"
- runFlow:
    file: "../helpers/login.yaml"
    env:
      EMAIL: "tecnico1@bayka.com"
      PASSWORD: "tecnico1_password"
- assertVisible:
    id: "plantaciones-list"

# Navigate to first plantation
- tapOn:
    index: 0
    parentId: "plantaciones-list"
- assertVisible:
    id: "subgroup-list"

# Navigate to first subgroup
- tapOn:
    index: 0
    parentId: "subgroup-list"

# Tap the first species button
- tapOn:
    id: "species-btn-PEU"

# Assert tree count is visible (registration happened)
- assertVisible:
    id: "tree-count"

# Tap undo to remove the last tree
- tapOn:
    id: "undo-button"
