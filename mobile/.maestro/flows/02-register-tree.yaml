appId: com.bayka.app
---
# Flow: Register a Tree via Species Button Grid

- launchApp:
    clearState: true
- assertVisible:
    id: "email-input"
- runFlow:
    file: "../helpers/login.yaml"
    env:
      EMAIL: "tecnico1@bayka.com"
      PASSWORD: "tecnico1_password"
- assertVisible:
    id: "plantaciones-list"

# Navigate to first plantation (tap first item in the list)
- tapOn:
    id: "plantaciones-list"
    index: 0
- assertVisible:
    id: "subgroup-list"

# Navigate to first subgroup
- tapOn:
    id: "subgroup-list"
    index: 0

# Tap the first species button
- tapOn:
    id: "species-btn-PEU"

# Assert tree count is visible (registration happened)
- assertVisible:
    id: "tree-count"

# Tap undo to remove the last tree
- tapOn:
    id: "undo-button"
