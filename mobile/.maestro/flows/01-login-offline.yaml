appId: com.bayka.app
---
# Flow: Offline Login with Cached Credentials
# Tests that a user can log in using previously cached credentials.

# Step 1: Launch with clean state and perform first online login to cache credentials
- launchApp:
    clearState: true
- assertVisible:
    id: "email-input"
- runFlow:
    file: "../helpers/login.yaml"
    env:
      EMAIL: "tecnico1@bayka.com"
      PASSWORD: "tecnico1_password"
- assertVisible:
    id: "plantaciones-list"

# Step 2: Re-launch app (simulates cached credentials path)
- launchApp:
    clearState: false
- assertVisible:
    id: "email-input"

# Step 3: Login using email chip (cached credential quick-login)
- tapOn:
    id: "email-chip-tecnico1@bayka.com"
- tapOn:
    id: "login-button"

# Step 4: Assert plantaciones screen is visible (login succeeded with cached credentials)
- assertVisible:
    id: "plantaciones-list"
