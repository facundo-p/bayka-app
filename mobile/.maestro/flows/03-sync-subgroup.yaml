appId: com.bayka.app
---
# Flow: Finalize and Sync a SubGroup

- launchApp:
    clearState: true
- assertVisible:
    id: "email-input"
- runFlow:
    file: "../helpers/login.yaml"
    env:
      EMAIL: "tecnico1@bayka.com"
      PASSWORD: "tecnico1_password"
- assertVisible:
    id: "plantaciones-list"

# Navigate to first plantation
- tapOn:
    id: "plantaciones-list"
    index: 0
- assertVisible:
    id: "subgroup-list"

# Navigate to first subgroup
- tapOn:
    id: "subgroup-list"
    index: 0

# Register at least one tree so we can finalize
- tapOn:
    id: "species-btn-PEU"

# Finalize the subgroup
- tapOn:
    id: "finalize-button"

# Confirm finalization dialog
- tapOn:
    text: "Finalizar"

# App navigates back to plantation detail after finalization
- assertVisible:
    id: "subgroup-list"

# Tap sync button
- tapOn:
    id: "sync-button"

# Confirm sync dialog
- tapOn:
    text: "Sincronizar"
