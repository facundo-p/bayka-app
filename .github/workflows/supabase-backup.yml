name: Daily Supabase Backup

on:
  schedule:
    # 5am UTC = 2am Argentina (UTC-3)
    - cron: "0 5 * * *"
  workflow_dispatch: {}

jobs:
  backup:
    name: Backup Supabase DB to Cloudflare R2
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install postgresql-client-17 and awscli
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          pip install --break-system-packages awscli

      - name: Run backup script
        run: bash scripts/supabase-backup.sh
