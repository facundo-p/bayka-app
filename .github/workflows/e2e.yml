# E2E Tests — Maestro on iOS Simulator
#
# DISABLED: E2E infrastructure not yet configured (Supabase secrets, simulator setup).
# Re-enable by removing the workflow_dispatch-only trigger below.
#
# NOTE: macOS runners cost 10x Ubuntu runners for private repos.
# This workflow only runs on pull_request to main to keep costs reasonable.
# Fast CI checks (lint, unit, integration) run on every push via ci.yml.
#
# E2E tests require a live Supabase backend and valid test credentials.
# Failures here may indicate infra issues, not code bugs.

name: E2E Tests

on:
  workflow_dispatch: # Manual trigger only until E2E infra is configured

jobs:
  e2e-ios:
    name: E2E iOS (Maestro)
    runs-on: macos-latest
    continue-on-error: true

    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Check E2E secrets
        run: |
          if [ -z "$EXPO_PUBLIC_SUPABASE_URL" ] || [ -z "$EXPO_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "::warning::Supabase secrets not configured. E2E tests will fail at login. Add EXPO_PUBLIC_SUPABASE_URL and EXPO_PUBLIC_SUPABASE_ANON_KEY as repo secrets."
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Install IDB companion (iOS simulator control)
        run: |
          brew tap facebook/fb
          brew install facebook/fb/idb-companion

      - name: Expo prebuild (iOS)
        working-directory: mobile
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods dependencies
        working-directory: mobile/ios
        run: pod install

      - name: Build iOS simulator app
        working-directory: mobile
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath build/ \
            -quiet

      - name: Boot iOS simulator and install app
        run: |
          SIMULATOR_ID=$(xcrun simctl list devices available -j | python3 -c "
          import sys, json
          devs = json.load(sys.stdin)['devices']
          iphones = [d for v in devs.values() for d in v if 'iPhone' in d['name'] and d.get('isAvailable', False)]
          print(iphones[0]['udid'])
          ")
          xcrun simctl boot $SIMULATOR_ID
          APP_PATH=$(find mobile/build/Build/Products -name "*.app" -type d | head -1)
          xcrun simctl install $SIMULATOR_ID "$APP_PATH"
          echo "SIMULATOR_ID=$SIMULATOR_ID" >> $GITHUB_ENV

      - name: Run Maestro E2E flows
        run: maestro test mobile/.maestro/flows/
